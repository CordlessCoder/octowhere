[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor"
rustflags = ["-C", "link-arg=-Tlinkall.x"]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["optimize_for_size"]

[env]
# "error" silences the harmless esp_wifi_internal_tx warnings that fire
# when the network runner task tries to send DHCP DISCOVER before the radio
# is started. Set back to "info" or "warn" for debugging.
ESP_LOG = "error"
# Provides a performance boost at the cost of using additional SRAM.
# Problem: without optimizations, uses way more ram.
# ESP_HAL_CONFIG_PLACE_ANON_IN_RAM = "true"
# These should be tuned carefully as they have a +- 15% perf impact on drawing and SPI flush.
ESP_HAL_CONFIG_DATA_CACHE_SIZE="64KB"
ESP_HAL_CONFIG_DATA_CACHE_LINE_SIZE="64B"
